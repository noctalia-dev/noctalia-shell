name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm --needed git clang

      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          mapfile -d '' files < <(find src \( -name '*.cpp' -o -name '*.h' \) -print0)
          clang-format --dry-run -Werror "${files[@]}"

  build:
    name: Build (${{ matrix.buildtype }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        buildtype: [debug, release]
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git meson ninja pkgconf \
            wayland wayland-protocols \
            libglvnd freetype2 harfbuzz fontconfig \
            cairo pango \
            libxkbcommon \
            sdbus-cpp libpipewire \
            pam curl libwebp

      - uses: actions/checkout@v4

      - name: Configure
        run: |
          args=(--buildtype=${{ matrix.buildtype }})
          if [ "${{ matrix.buildtype }}" = "release" ]; then
            args+=(-Db_lto=true)
          fi
          meson setup build-${{ matrix.buildtype }} "${args[@]}"

      - name: Build
        run: meson compile -C build-${{ matrix.buildtype }}
