[config]

[catalog.alacritty]
name = "Alacritty"
category = "terminal"

[catalog.btop]
name = "Btop"
category = "misc"

[catalog.foot]
name = "Foot"
category = "terminal"

[catalog.fuzzel]
name = "Fuzzel"
category = "launcher"

[catalog.ghostty]
name = "Ghostty"
category = "terminal"

[catalog.gtk3]
name = "GTK 3"
category = "system"

[catalog.gtk4]
name = "GTK 4"
category = "system"

[catalog.helix]
name = "Helix"
category = "editor"

[catalog.kcolorscheme]
name = "KColorScheme"
category = "system"

[catalog.kitty]
name = "Kitty"
category = "terminal"

[catalog.qtct]
name = "Qt"
category = "system"

[catalog.starship]
name = "Starship"
category = "terminal"

[catalog.vicinae]
name = "Vicinae"
category = "launcher"

[catalog.walker]
name = "Walker"
category = "launcher"

[catalog.wezterm]
name = "Wezterm"
category = "terminal"

[catalog.yazi]
name = "Yazi"
category = "misc"

[catalog.zathura]
name = "Zathura"
category = "misc"

[catalog.zed]
name = "Zed"
category = "editor"

[templates.alacritty]
input_path = "./alacritty/alacritty.toml"
output_path = "~/.config/alacritty/themes/noctalia.toml"
post_hook = "bash '{{ config_dir }}/alacritty/apply.sh'"

[templates.btop]
input_path = "./btop/btop.theme"
output_path = "~/.config/btop/themes/noctalia.theme"
post_hook = "bash '{{ config_dir }}/btop/apply.sh'"

[templates.foot]
input_path = "./foot/foot"
output_path = "~/.config/foot/themes/noctalia"
post_hook = "bash '{{ config_dir }}/foot/apply.sh'"

[templates.fuzzel]
input_path = "./fuzzel/fuzzel.conf"
output_path = "~/.config/fuzzel/themes/noctalia"
post_hook = "bash '{{ config_dir }}/fuzzel/apply.sh'"

[templates.ghostty]
input_path = "./ghostty/ghostty"
output_path = "~/.config/ghostty/themes/noctalia"
post_hook = "bash '{{ config_dir }}/ghostty/apply.sh'"

[templates.gtk3]
input_path = "./gtk/gtk3.css"
output_path = "~/.config/gtk-3.0/noctalia.css"
post_hook = "bash '{{ config_dir }}/gtk/gtk-refresh.sh' {{ mode }}"

[templates.gtk4]
input_path = "./gtk/gtk4.css"
output_path = "~/.config/gtk-4.0/noctalia.css"
post_hook = "bash '{{ config_dir }}/gtk/gtk-refresh.sh' {{ mode }}"

[templates.helix]
input_path = "./helix/helix.toml"
output_path = "~/.config/helix/themes/noctalia.toml"

[templates.kcolorscheme]
input_path = "./kde/kcolorscheme.colors"
output_path = "~/.local/share/color-schemes/noctalia.colors"
post_hook = "python3 '{{ config_dir }}/kde/kde-apply-scheme.py' noctalia"

[templates.kitty]
input_path = "./kitty/kitty.conf"
output_path = "~/.config/kitty/themes/noctalia.conf"
post_hook = "bash '{{ config_dir }}/kitty/apply.sh'"

[templates.qtct]
input_path = "./qt/qtct.conf"
output_path = ["~/.config/qt5ct/colors/noctalia.conf", "~/.config/qt6ct/colors/noctalia.conf"]

[templates.starship]
input_path = "./starship/starship.toml"
output_path = "~/.cache/noctalia/starship-palette.toml"
post_hook = "bash '{{ config_dir }}/starship/apply.sh'"

[templates.vicinae]
input_path = "./vicinae/vicinae.toml"
output_path = "~/.local/share/vicinae/themes/noctalia.toml"
post_hook = "bash '{{ config_dir }}/vicinae/apply.sh' '{{ config_dir }}/../noctalia.svg'"

[templates.walker]
input_path = "./walker/walker.css"
output_path = "~/.config/walker/themes/noctalia/style.css"
post_hook = "bash '{{ config_dir }}/walker/apply.sh'"

[templates.wezterm]
input_path = "./wezterm/wezterm.toml"
output_path = "~/.config/wezterm/colors/Noctalia.toml"
post_hook = "bash '{{ config_dir }}/wezterm/apply.sh'"

[templates.yazi]
input_path = "./yazi/yazi.toml"
output_path = "~/.config/yazi/flavors/noctalia.yazi/flavor.toml"
post_hook = "bash '{{ config_dir }}/yazi/apply.sh'"

[templates.zathura]
input_path = "./zathura/zathurarc"
output_path = "~/.config/zathura/noctaliarc"
post_hook = "bash '{{ config_dir }}/zathura/apply.sh'"

[templates.zed]
input_path = "./zed/zed.json"
output_path = "~/.config/zed/themes/noctalia.json"
